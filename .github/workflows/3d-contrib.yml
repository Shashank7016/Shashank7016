name: Generate Profile Visuals

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contrib-3d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Shashank7016

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git pull --rebase
          git add -A
          git diff --staged --quiet || git commit -m "Update 3D contribution graph"
          git push

  isometric:
    runs-on: ubuntu-latest
    needs: contrib-3d
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_PAT }}
          filename: dist/isometric.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_display: large
          config_output: svg
          config_animations: yes
          plugins_errors_fatal: no

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git pull --rebase
          git add -A
          git diff --staged --quiet || git commit -m "Update isometric calendar"
          git push
